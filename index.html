<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drake</title>
<link rel="icon" type="image/png" href="logo.png">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f1f12;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  }
  .card {
    background: #ffffff;
    border-radius: 16px;
    padding: 40px 32px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    text-align: center;
  }
  .card img.logo {
    height: 88px;
    width: 88px;
    object-fit: contain;
    margin-bottom: 12px;
  }
  .card h1 {
    font-size: 32px;
    font-weight: 800;
    margin: 0 0 8px;
    color: #14532d;
  }
  .card p.subtitle {
    margin: 0 0 28px;
    color: #6b7280;
    font-size: 14px;
  }
  button#loginBtn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 12px 16px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    background: #fff;
    font-size: 15px;
    font-weight: 500;
    color: #1f2937;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  button#loginBtn:hover {
    background: #f3f4f6;
  }
  button#loginBtn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  button#loginBtn svg {
    width: 18px;
    height: 18px;
  }
  #message {
    margin-top: 20px;
    font-size: 14px;
    min-height: 18px;
  }
  #message.error {
    color: #b91c1c;
  }
  #message.info {
    color: #374151;
  }
</style>
</head>
<body>

  <div class="card">
    <img class="logo" src="logo.png" alt="Drake">
    <h1>Drake</h1>
    <p class="subtitle">Faça login para acessar o bolão</p>

    <button id="loginBtn">
      <svg viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.5H42V20.5H24v7.9h11.3c-1.6 4.6-6 7.9-11.3 7.9-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.6-5.6C34.5 6.2 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.4-.4-3.5z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.1 18.9 12 24 12c3.1 0 5.9 1.2 8 3.1l5.6-5.6C34.5 6.2 29.6 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.5 0 10.4-1.8 14.2-5l-6.6-5.4c-2 1.4-4.6 2.4-7.6 2.4-5.3 0-9.7-3.3-11.3-7.9l-6.6 5.1C9.5 39.6 16.2 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.5H42V20.5H24v7.9h11.3c-.8 2.3-2.2 4.2-4.1 5.6l6.6 5.4C41.5 36 44 30.5 44 24c0-1.2-.1-2.4-.4-3.5z"/>
      </svg>
      Entrar com Google
    </button>

    <div id="message"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      deleteDoc,
      collection,
      query,
      where,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDMuZb6L2HjddNtvJQHrqADlTuTHnwJ2M8",
      authDomain: "bolao-drake.firebaseapp.com",
      projectId: "bolao-drake",
      storageBucket: "bolao-drake.firebasestorage.app",
      messagingSenderId: "832605376091",
      appId: "1:832605376091:web:d7644b2ba92ab896f1797e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginBtn = document.getElementById("loginBtn");
    const messageEl = document.getElementById("message");

    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = type || "";
    }

    function setLoading(isLoading) {
      loginBtn.disabled = isLoading;
    }

    async function handleUser(user) {
      showMessage("Verificando cadastro...", "info");
      try {
        const userDocRef = doc(db, "users", user.uid);
        let userDocSnap = await getDoc(userDocRef);
        let userData;

        if (userDocSnap.exists()) {
          userData = userDocSnap.data();
        } else {
          // Cadastro antecipado pelo admin (ainda sem uid) — busca por email
          const usersRef = collection(db, "users");
          const q = query(usersRef, where("email", "==", user.email));
          const snapshot = await getDocs(q);

          if (snapshot.empty) {
            await signOut(auth);
            showMessage("Acesso não autorizado. Entre em contato com o administrador.", "error");
            setLoading(false);
            return;
          }

          const oldDocSnap = snapshot.docs[0];
          userData = oldDocSnap.data();

          // Migra o cadastro para o documento com ID = uid, para próximos logins serem diretos
          await setDoc(userDocRef, { ...userData, uid: user.uid });
          await deleteDoc(oldDocSnap.ref);
        }

        console.log("Email do usuário logado:", user.email);
        console.log("UID do usuário logado:", user.uid);
        console.log("Dados do usuário:", userData);

        if (userData.role === "admin") {
          window.location.href = "admin.html";
        } else if (userData.role === "participante") {
          window.location.href = "participante.html";
        } else {
          await signOut(auth);
          showMessage("Acesso não autorizado. Entre em contato com o administrador.", "error");
          setLoading(false);
        }
      } catch (err) {
        console.error(err);
        showMessage("Erro ao verificar cadastro: " + err.message, "error");
        setLoading(false);
      }
    }

    loginBtn.addEventListener("click", async () => {
      setLoading(true);
      showMessage("", "");
      try {
        const provider = new GoogleAuthProvider();
        const result = await signInWithPopup(auth, provider);
        await handleUser(result.user);
      } catch (err) {
        console.error(err);
        showMessage("Erro ao entrar: " + err.message, "error");
        setLoading(false);
      }
    });
  </script>

</body>
</html>
