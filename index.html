<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drake</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08080f;
    --card: #0f0f1e;
    --cyan: #00c8d4;
    --gold: #FFD700;
    --silver: #C0C0C0;
    --bronze: #CD7F32;
    --text: #e5e7eb;
    --text-muted: #8b8b9e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: "Barlow Condensed", sans-serif;
  }
  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 40px 32px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    border: 1px solid rgba(0, 200, 212, 0.15);
    text-align: center;
  }
  .card img.logo {
    height: 88px;
    width: 88px;
    object-fit: contain;
    margin-bottom: 12px;
  }
  .card h1 {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: 0.5px;
    margin: 0 0 8px;
    color: #fff;
  }
  .card p.subtitle {
    margin: 0 0 28px;
    color: var(--text-muted);
    font-size: 14px;
  }
  .field {
    text-align: left;
    margin-bottom: 14px;
  }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    background: #1b1b32;
    font-size: 15px;
    font-family: inherit;
    color: #fff;
  }
  .field input:focus {
    outline: none;
    border-color: var(--cyan);
  }
  button.primary-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 12px 16px;
    border: none;
    border-radius: 8px;
    background: var(--cyan);
    font-size: 15px;
    font-weight: 700;
    color: #08080f;
    cursor: pointer;
    transition: background 0.15s ease;
    margin-top: 4px;
    font-family: inherit;
  }
  button.primary-btn:hover {
    background: #2adde6;
  }
  button.primary-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  #message, #trocaSenhaMessage {
    margin-top: 20px;
    font-size: 14px;
    min-height: 18px;
  }
  #message.error, #trocaSenhaMessage.error {
    color: #f87171;
  }
  #message.info, #trocaSenhaMessage.info {
    color: var(--text-muted);
  }

  @media (max-width: 400px) {
    body { padding: 16px; align-items: flex-start; padding-top: 48px; }
    .card { padding: 28px 22px; }
    .card h1 { font-size: 28px; }
    .card img.logo { height: 72px; width: 72px; }
  }
</style>
</head>
<body>

  <div class="card" id="loginCard">
    <img class="logo" src="logo.png" alt="Drake">
    <h1>Drake</h1>
    <p class="subtitle">Faça login para acessar o bolão</p>

    <form id="loginForm">
      <div class="field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" required autocomplete="username">
      </div>
      <div class="field">
        <label for="loginSenha">Senha</label>
        <input type="password" id="loginSenha" required autocomplete="current-password">
      </div>
      <button type="submit" class="primary-btn" id="loginBtn">Entrar</button>
    </form>

    <div id="message"></div>
  </div>

  <div class="card" id="trocaSenhaCard" style="display:none;">
    <img class="logo" src="logo.png" alt="Drake">
    <h1>Drake</h1>
    <p class="subtitle">Este é seu primeiro acesso. Defina uma nova senha para continuar.</p>

    <form id="trocaSenhaForm">
      <div class="field">
        <label for="novaSenha">Nova senha</label>
        <input type="password" id="novaSenha" required minlength="6" autocomplete="new-password">
      </div>
      <div class="field">
        <label for="confirmarSenha">Confirmar nova senha</label>
        <input type="password" id="confirmarSenha" required minlength="6" autocomplete="new-password">
      </div>
      <button type="submit" class="primary-btn" id="trocaSenhaBtn">Salvar nova senha e continuar</button>
    </form>

    <div id="trocaSenhaMessage"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signInWithEmailAndPassword,
      updatePassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      updateDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDMuZb6L2HjddNtvJQHrqADlTuTHnwJ2M8",
      authDomain: "bolao-drake.firebaseapp.com",
      projectId: "bolao-drake",
      storageBucket: "bolao-drake.firebasestorage.app",
      messagingSenderId: "832605376091",
      appId: "1:832605376091:web:d7644b2ba92ab896f1797e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginCard = document.getElementById("loginCard");
    const trocaSenhaCard = document.getElementById("trocaSenhaCard");
    const loginForm = document.getElementById("loginForm");
    const loginBtn = document.getElementById("loginBtn");
    const messageEl = document.getElementById("message");
    const trocaSenhaForm = document.getElementById("trocaSenhaForm");
    const trocaSenhaBtn = document.getElementById("trocaSenhaBtn");
    const trocaSenhaMessage = document.getElementById("trocaSenhaMessage");

    let pendingUserDocRef = null;
    let pendingRole = null;

    function showMessage(el, text, type) {
      el.textContent = text;
      el.className = type || "";
    }

    function setLoading(btn, isLoading) {
      btn.disabled = isLoading;
    }

    function redirecionar(role) {
      if (role === "admin") {
        window.location.href = "admin.html";
      } else if (role === "participante") {
        window.location.href = "participante.html";
      } else {
        signOut(auth);
        showMessage(messageEl, "Acesso não autorizado. Entre em contato com o administrador.", "error");
        setLoading(loginBtn, false);
      }
    }

    async function handleUser(user) {
      showMessage(messageEl, "Verificando cadastro...", "info");
      try {
        const userDocRef = doc(db, "users", user.uid);
        const userDocSnap = await getDoc(userDocRef);

        if (!userDocSnap.exists()) {
          await signOut(auth);
          showMessage(messageEl, "Acesso não autorizado. Entre em contato com o administrador.", "error");
          setLoading(loginBtn, false);
          return;
        }

        const userData = userDocSnap.data();

        if (userData.precisaTrocarSenha) {
          pendingUserDocRef = userDocRef;
          pendingRole = userData.role;
          loginCard.style.display = "none";
          trocaSenhaCard.style.display = "block";
          return;
        }

        redirecionar(userData.role);
      } catch (err) {
        console.error(err);
        showMessage(messageEl, "Erro ao verificar cadastro: " + err.message, "error");
        setLoading(loginBtn, false);
      }
    }

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      setLoading(loginBtn, true);
      showMessage(messageEl, "", "");
      const email = document.getElementById("loginEmail").value.trim().toLowerCase();
      const senha = document.getElementById("loginSenha").value;
      try {
        const result = await signInWithEmailAndPassword(auth, email, senha);
        await handleUser(result.user);
      } catch (err) {
        console.error(err);
        showMessage(messageEl, "Email ou senha incorretos.", "error");
        setLoading(loginBtn, false);
      }
    });

    trocaSenhaForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const novaSenha = document.getElementById("novaSenha").value;
      const confirmarSenha = document.getElementById("confirmarSenha").value;

      if (novaSenha.length < 6) {
        showMessage(trocaSenhaMessage, "A senha deve ter pelo menos 6 caracteres.", "error");
        return;
      }
      if (novaSenha !== confirmarSenha) {
        showMessage(trocaSenhaMessage, "As senhas não coincidem.", "error");
        return;
      }

      setLoading(trocaSenhaBtn, true);
      showMessage(trocaSenhaMessage, "Salvando nova senha...", "info");
      try {
        await updatePassword(auth.currentUser, novaSenha);
        await updateDoc(pendingUserDocRef, { precisaTrocarSenha: false });
        redirecionar(pendingRole);
      } catch (err) {
        console.error(err);
        showMessage(trocaSenhaMessage, "Erro ao salvar nova senha: " + err.message, "error");
        setLoading(trocaSenhaBtn, false);
      }
    });

    // Se já existe uma sessão salva no navegador, pula o formulário e entra direto.
    setLoading(loginBtn, true);
    showMessage(messageEl, "Verificando sessão...", "info");
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        await handleUser(user);
      } else {
        showMessage(messageEl, "", "");
        setLoading(loginBtn, false);
      }
    });
  </script>

</body>
</html>
